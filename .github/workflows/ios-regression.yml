name: "Build & Test iOS"

permissions:
  contents: write
  packages: read
  id-token: write
  pages: write 
  actions: read

# Define default artifact capture settings for entire workflow
env:
  DEFAULT_LOG_LEVEL: 'info'
  DEFAULT_CAPTURE_LOGS: 'failing'
  DEFAULT_CAPTURE_SCREENSHOTS: 'all'
  DEFAULT_CAPTURE_VIDEO: 'failing'
  DEFAULT_RECORD_PERFORMANCE: 'none'

on:
  # Run all tests when changes are pushed onto the main branch
  push:
    branches: [ main ]
  
  # Run all tests before being merged to main, when branches are opened or synchronized
  pull_request:
    branches: [ main ]

  # Run all tests every day at 10:00 PM EST
  # schedule:
  #  - cron: '0 3 * * *'  # 10:00 PM EST = 3:00 AM UTC
  
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Select either all or specific test suite to run'
        required: true
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'login.test.ts'
          - 'secure-area.test.ts'
      device:
        description: 'Select iOS device to run tests on'
        required: true
        type: choice
        default: 'iPhone 16 Pro'
        options:
          - 'iPhone 16'
          - 'iPhone 16 Pro'
          - 'iPhone 16 Pro Max'
          - 'iPad mini (6th generation)'
          - 'iPad Air (5th generation)'
          - 'iPad Pro (12.9-inch) (6th generation)'
      os_version:
        description: 'Select iOS version to run tests on'
        required: true
        type: choice
        default: '18.2'
        options:
          - '17.0.1'
          - '17.2'
          - '17.4'
          - '17.5'
          - '18.1'
          - '18.2'
      logger_level:
        description: 'Log levels - most to least verbose'
        required: true
        type: choice
        default: 'info'
        options:
          - 'trace'
          - 'debug'
          - 'verbose'
          - 'info'
          - 'warn'
          - 'error'
          - 'fatal'

# Artifacts - Control what test artifacts are captured (https://wix.github.io/Detox/docs/config/artifacts/)          
          
      capture_logs:
        description: 'Capture test logs?'
        required: true
        type: choice
        default: 'failing'
        options:
          - 'failing'
          - 'all'
          - 'none'
      capture_screenshots:
        description: 'Capture screenshots?'
        required: true
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'failing'
          - 'none'
      capture_video:
        description: 'Capture video?'
        required: true
        type: choice
        default: 'failing'
        options:
          - 'none'
          - 'failing'
          - 'all'
      record_performance:
        description: 'Detox Instruments performance? (iOS only)'
        required: true
        type: choice
        default: 'none'
        options:
          - 'none'
          - 'all'
      
# Note: Detox Instruments performance is iOS only, therefore this option is only in the GitHub Actions workflow
#  for workflows/ios-regression.yml and not workflows/android-regression.yml

jobs:
  # =============================================================================
  # Stage 0: Input Validation
  # =============================================================================
  
  validate-inputs:
    name: Validate Inputs
    runs-on: macos-14
    timeout-minutes: 5
    permissions:
      contents: read
    
    steps:
      - name: Validate and sanitize inputs
        run: |
          echo "=== Validating Workflow Inputs ==="
          
          # Validate iOS version format (must be X.Y or X.Y.Z)
          OS_VERSION="${{ github.event.inputs.os_version || '18.2' }}"
          if ! echo "$OS_VERSION" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "❌ ERROR: Invalid iOS version format: $OS_VERSION"
            echo "   Expected format: X.Y or X.Y.Z (e.g., 18.2 or 18.2.1)"
            exit 1
          fi
          
          # Sanitize device name (remove any potentially dangerous characters)
          DEVICE_RAW="${{ github.event.inputs.device || 'iPhone 16 Pro' }}"
          DEVICE_SAFE=$(echo "$DEVICE_RAW" | tr -cd '[:alnum:] ().-')
          if [ "$DEVICE_RAW" != "$DEVICE_SAFE" ]; then
            echo "⚠️  Device name contains invalid characters"
            echo "   Original: $DEVICE_RAW"
            echo "   Sanitized: $DEVICE_SAFE"
          fi
          
          # Sanitize test suite name
          TEST_SUITE_RAW="${{ github.event.inputs.test_suite || 'all' }}"
          TEST_SUITE_SAFE=$(echo "$TEST_SUITE_RAW" | tr -cd '[:alnum:].-')
          if [ "$TEST_SUITE_RAW" != "$TEST_SUITE_SAFE" ]; then
            echo "⚠️  Test suite name contains invalid characters"
            echo "   Original: $TEST_SUITE_RAW"
            echo "   Sanitized: $TEST_SUITE_SAFE"
          fi
          
          echo "✅ All inputs validated successfully"
          echo "   Device: $DEVICE_SAFE"
          echo "   iOS Version: $OS_VERSION"
          echo "   Test Suite: $TEST_SUITE_SAFE"

  # =============================================================================
  # Stage 1: Build iOS Application
  # =============================================================================
  
  build:
    runs-on: macos-14
    needs: validate-inputs
    if: success() && needs.validate-inputs.result == 'success'
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      build-success: ${{ steps.build-app.outcome }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Use Xcode 16 for iPhone 16 simulator support
      - name: Select Xcode version
        run: |
          echo "Available Xcode versions:"
          ls /Applications/ | grep Xcode
          # Use Xcode 16.x for iPhone 16 simulator support
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Selected Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Set up Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> $HOME/.zprofile
          eval "$(/opt/homebrew/bin/brew shellenv)"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Cache Homebrew and RubyGems
        uses: actions/cache@v3
        with:
          path: |
            /opt/homebrew/Cellar
            /opt/homebrew/lib
            ~/.gem
          key: ${{ runner.os }}-homebrew-gems-${{ hashFiles('**/Gemfile.lock', '**/Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-gems-

      - name: Set up Node.js for React Native & Detox
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Clean lock file conflicts
        run: rm -f package-lock.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          gem install cocoapods
          pod install --repo-update

      - name: Install Applesimutils
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv)"
          brew tap wix/brew
          brew install applesimutils
          brew link applesimutils
          echo "✅ Applesimutils installed"
          applesimutils --version

      - name: Build Detox for iOS
        id: build-app
        run: |
          echo "Building React Native app for Detox testing..."
          
          # List available simulators for debugging
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep "iPhone"

          # List available os for debugging
          echo "Available iOS versions:"
          xcrun simctl list runtimes
          
          # Build the iOS app without Metro (React Native handles bundling)
          echo "Building iOS app with embedded JS bundle..."
          cd ios
          DEVICE_NAME="${{ github.event.inputs.device || 'iPhone 16 Pro' }}"
          OS_VERSION="${{ github.event.inputs.os_version || '18.2' }}"
          xcodebuild \
            -workspace DetoxDemo.xcworkspace \
            -scheme DetoxDemo \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME,OS=$OS_VERSION"
          
          cd ..
          
          echo "Build completed successfully"
        env:
          CI: true
          NODE_ENV: development

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_id }}
          path: |
            ios/build/
            node_modules/.bin/detox
          retention-days: 1

  # =============================================================================
  # Stage 2: Run E2E Tests
  # =============================================================================
  
  test:
    runs-on: macos-14
    needs: build
    if: needs.build.outputs.build-success == 'success'
    outputs:
      test-results: ${{ steps.run-tests.outcome }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Use Xcode 16 for iPhone 16 simulator support (must match build job)
      - name: Select Xcode version
        run: |
          echo "Available Xcode versions:"
          ls /Applications/ | grep Xcode
          # Use Xcode 16.x for iPhone 16 simulator support
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Selected Xcode: $(xcode-select -p)"
          xcodebuild -version
          # Show available simulators for debugging
          echo "Available iOS simulators:"
          xcrun simctl list devices available | head -50

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-build-${{ github.run_id }}
          
      - name: Verify build artifacts
        run: |
          echo "Verifying iOS app build..."
          ls -la ios/build/Build/Products/Debug-iphonesimulator/
          
          # Check if .app exists
          if [ -d "ios/build/Build/Products/Debug-iphonesimulator/DetoxDemo.app" ]; then
            echo "✅ DetoxDemo.app found"
            ls -la ios/build/Build/Products/Debug-iphonesimulator/DetoxDemo.app/
          else
            echo "❌ ERROR: DetoxDemo.app not found!"
            exit 1
          fi

      - name: Install Applesimutils
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv)"
          brew tap wix/brew
          brew install applesimutils

      - name: Run Detox e2e tests
        id: run-tests
        continue-on-error: true
        run: |
          # Create directories explicitly
          mkdir -p allure-results
          mkdir -p artifacts
          
          # Set device from workflow input or default to iPhone 16 Pro for automated runs
          DEVICE_NAME="${{ github.event.inputs.device || 'iPhone 16 Pro' }}"
          echo "Running tests on device: $DEVICE_NAME"
          
          # Start Metro bundler for tests
          echo "Starting Metro bundler for test execution..."
          yarn start --reset-cache &
          METRO_PID=$!
          
          # Wait for Metro to be ready with healthcheck
          echo "Waiting for Metro bundler to start..."
          sleep 15
          
          # Verify Metro is responding
          echo "Checking Metro health..."
          for i in {1..60}; do
            if curl -s http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is ready!"
              break
            fi
            echo "Waiting for Metro... attempt $i/60"
            sleep 2
          done
          
          # Pre-generate the initial bundle before tests start
          # This is critical - the app will timeout if bundle isn't ready
          echo "Pre-generating initial JavaScript bundle (this may take 30-60 seconds)..."
          BUNDLE_START=$(date +%s)
          
          # Actually download the full bundle and wait for it to complete
          # Using --max-time to prevent hanging, -f to fail on HTTP errors
          if curl -sf --max-time 120 "http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false" -o /tmp/bundle.js; then
            BUNDLE_SIZE=$(wc -c < /tmp/bundle.js)
            BUNDLE_END=$(date +%s)
            BUNDLE_TIME=$((BUNDLE_END - BUNDLE_START))
            echo "✅ Bundle generated successfully!"
            echo "   Size: $BUNDLE_SIZE bytes"
            echo "   Time: ${BUNDLE_TIME}s"
            rm /tmp/bundle.js
          else
            echo "⚠️ Bundle generation may have failed, but continuing..."
          fi
          
          # Request bundle again to ensure it's cached
          echo "Warming up bundle cache..."
          curl -sf --max-time 60 "http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false" > /dev/null || true
          
          # Give Metro a moment to stabilize after bundle generation
          echo "Waiting for Metro to stabilize..."
          sleep 5
          
          # Verify bundle is available and cached
          echo "Verifying bundle availability..."
          if curl -sf --max-time 10 "http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false" | head -c 1000 | grep -q "sourceMappingURL"; then
            echo "✅ Bundle is ready and cached!"
          else
            echo "⚠️ Bundle verification failed, tests may timeout!"
          fi
          
          # List available simulators
          echo "Available iOS simulators:"
          xcrun simctl list devices available
          
          # Find and boot the selected simulator
          echo "Looking for $DEVICE_NAME simulator..."
          SIMULATOR_ID=$(xcrun simctl list devices | grep "$DEVICE_NAME" | head -1 | grep -o '[A-Z0-9-]\{36\}')
          
          if [ ! -z "$SIMULATOR_ID" ]; then
            echo "Found $DEVICE_NAME simulator: $SIMULATOR_ID"
            echo "Booting $DEVICE_NAME..."
            xcrun simctl boot "$SIMULATOR_ID" || echo "Simulator already booted"
            
            # Wait for simulator to be fully booted
            echo "Waiting for simulator to boot completely..."
            sleep 10
            
            until xcrun simctl bootstatus "$SIMULATOR_ID" | grep -q "Device already booted"; do
              echo "Waiting for simulator to finish booting..."
              sleep 2
            done
            
            echo "Simulator ready!"
            xcrun simctl list devices | grep "$SIMULATOR_ID"
          fi
          
          echo "Starting Detox tests on $DEVICE_NAME with Metro running..."
          
          # Set artifact capture settings from workflow inputs (defaults for automated runs)
          LOG_LEVEL="${{ github.event.inputs.logger_level || 'info' }}"
          CAPTURE_LOGS="${{ github.event.inputs.capture_logs || 'failing' }}"
          CAPTURE_SCREENSHOTS="${{ github.event.inputs.capture_screenshots || 'all' }}"
          CAPTURE_VIDEO="${{ github.event.inputs.capture_video || 'none' }}"
          RECORD_PERFORMANCE="${{ github.event.inputs.record_performance || 'none' }}"
          
          echo "Test configuration:"
          echo "  Device: $DEVICE_NAME"
          echo "  Log level: $LOG_LEVEL"
          echo "  Capture logs: $CAPTURE_LOGS"
          echo "  Capture screenshots: $CAPTURE_SCREENSHOTS"
          echo "  Capture video: $CAPTURE_VIDEO"
          echo "  Record performance: $RECORD_PERFORMANCE"
          
          # Run Detox tests with artifact settings
          if [ "${{ github.event.inputs.test_suite }}" == "all" ] || [ -z "${{ github.event.inputs.test_suite }}" ]; then
            echo "Running all Detox tests..."
            yarn detox:test:ios \
              --loglevel "$LOG_LEVEL" \
              --artifacts-location artifacts \
              --record-logs "$CAPTURE_LOGS" \
              --take-screenshots "$CAPTURE_SCREENSHOTS" \
              --record-videos "$CAPTURE_VIDEO" \
              --record-performance "$RECORD_PERFORMANCE"
          else
            echo "Running specific test: ${{ github.event.inputs.test_suite }}"
            yarn detox test e2e/${{ github.event.inputs.test_suite }} \
              --configuration ios.sim.debug \
              --loglevel "$LOG_LEVEL" \
              --artifacts-location artifacts \
              --record-logs "$CAPTURE_LOGS" \
              --take-screenshots "$CAPTURE_SCREENSHOTS" \
              --record-videos "$CAPTURE_VIDEO" \
              --record-performance "$RECORD_PERFORMANCE"
          fi
          
          # Check if allure-results has content
          echo "Checking allure-results directory..."
          ls -la allure-results/ || echo "allure-results is empty"
          find allure-results -type f -name "*.json" -print0 | xargs -0 wc -l || echo "Failed to count JSON files in allure-results"
          
          # Stop Metro bundler after tests
          echo "Stopping Metro bundler..."
          kill $METRO_PID || true
          
          echo "Detox tests completed on $DEVICE_NAME"
        env:
          DETOX_ENABLE_ALLURE: 'true'
          DETOX_CONFIGURATION: ios.sim.debug
          CI: true
          RCT_METRO_PORT: 8081

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-test-results-${{ github.run_id }}
          path: |
            artifacts/
            allure-results/
          retention-days: 7

  # =============================================================================
  # Stage 3: Generate and Publish Allure Report
  # =============================================================================
  
  publish-allure-report:
    runs-on: macos-14
    needs: [build, test]
    if: always() && needs.build.outputs.build-success == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test results
        if: needs.test.outputs.test-results == 'success' || needs.test.outputs.test-results == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: detox-test-results-${{ github.run_id }}
          path: .
        continue-on-error: true

      - name: Verify downloaded artifacts
        if: always()
        run: |
          echo "=== Verifying downloaded test artifacts ==="
          echo "Current directory structure:"
          ls -la
          
          echo ""
          echo "Checking for artifacts directory:"
          if [ -d "artifacts" ]; then
            echo "✅ artifacts/ directory found"
            ls -la artifacts/
            find artifacts -type f | head -20
          else
            echo "❌ artifacts/ directory NOT found"
          fi
          
          echo ""
          echo "Checking for allure-results directory:"
          if [ -d "allure-results" ]; then
            echo "✅ allure-results/ directory found"
            ls -la allure-results/
            echo "JSON files: $(find allure-results -name '*.json' -type f | wc -l)"
          else
            echo "❌ allure-results/ directory NOT found"
          fi

      - name: Checkout GitHub Pages branch for history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          echo "Copying Allure history from previous report..."
          if [ -d "gh-pages-history/ios/history" ]; then
            echo "Found previous history, copying to allure-results..."
            mkdir -p allure-results/history
            cp -r gh-pages-history/ios/history/* allure-results/history/ || true
            echo "✅ History copied successfully"
            ls -la allure-results/history/
          else
            echo "ℹ️  No previous history found, this will be the first report"
          fi

      - name: Set up Allure
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv)"
          brew install allure

      - name: Verify Allure installation
        run: |
          echo "Verifying Allure installation..."
          allure --version
          
          # DEBUG: Check what was actually created
          echo "=== Checking for allure-results after test execution ==="
          if [ -d "allure-results" ]; then
            echo "✅ allure-results directory exists"
            ls -laR allure-results/
            echo "JSON file count: $(find allure-results -name '*.json' -type f | wc -l)"
          else
            echo "⚠️  allure-results directory does NOT exist - creating it"
            mkdir -p allure-results
          fi

      - name: Attach Detox artifacts to Allure results
        if: always()
        run: |
          echo "=== Processing Detox artifacts for Allure report ==="
          
          # Create attachments directory
          mkdir -p allure-results/attachments
          
          # Check if artifacts directory exists
          if [ ! -d "artifacts" ]; then
            echo "⚠️  No artifacts directory found"
            echo "This may occur if:"
            echo "  - Tests didn't run"
            echo "  - Artifacts weren't captured (check capture settings)"
            echo "  - Artifact upload/download failed"
            echo ""
            echo "Current directory contents:"
            ls -la
            exit 0
          fi
          
          echo "✅ Found artifacts directory"
          echo "Processing artifact files..."
          echo ""
          
          # Track what we find
          FOUND_ANY=false
          
          # Copy screenshots
          if find artifacts -name "*.png" -type f 2>/dev/null | grep -q .; then
            echo "📸 Copying screenshots to Allure attachments..."
            find artifacts -name "*.png" -type f -exec cp {} allure-results/attachments/ \;
            SCREENSHOT_COUNT=$(find allure-results/attachments -name "*.png" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "   ✅ Copied $SCREENSHOT_COUNT screenshots"
            FOUND_ANY=true
          else
            echo "   ℹ️  No screenshots (capture_screenshots: ${{ github.event.inputs.capture_screenshots || env.DEFAULT_CAPTURE_SCREENSHOTS }})"
          fi
          
          # Copy videos
          if find artifacts -name "*.mp4" -type f 2>/dev/null | grep -q .; then
            echo "🎥 Copying videos to Allure attachments..."
            find artifacts -name "*.mp4" -type f -exec cp {} allure-results/attachments/ \;
            VIDEO_COUNT=$(find allure-results/attachments -name "*.mp4" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "   ✅ Copied $VIDEO_COUNT videos"
            FOUND_ANY=true
          else
            echo "   ℹ️  No videos (capture_video: ${{ github.event.inputs.capture_video || env.DEFAULT_CAPTURE_VIDEO }})"
          fi
          
          # Copy log files
          if find artifacts -name "*.log" -type f 2>/dev/null | grep -q .; then
            echo "📋 Copying logs to Allure attachments..."
            find artifacts -name "*.log" -type f -exec cp {} allure-results/attachments/ \;
            LOG_COUNT=$(find allure-results/attachments -name "*.log" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "   ✅ Copied $LOG_COUNT log files"
            FOUND_ANY=true
          else
            echo "   ℹ️  No logs (capture_logs: ${{ github.event.inputs.capture_logs || env.DEFAULT_CAPTURE_LOGS }})"
          fi
          
          # Copy performance traces (iOS only)
          if find artifacts -name "*.trace" -type f 2>/dev/null | grep -q .; then
            echo "📊 Copying performance traces to Allure attachments..."
            find artifacts -name "*.trace" -type f -exec cp {} allure-results/attachments/ \;
            TRACE_COUNT=$(find allure-results/attachments -name "*.trace" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "   ✅ Copied $TRACE_COUNT performance traces"
            FOUND_ANY=true
          else
            echo "   ℹ️  No traces (record_performance: ${{ github.event.inputs.record_performance || env.DEFAULT_RECORD_PERFORMANCE }})"
          fi
          
          echo ""
          echo "=== Artifact Summary ==="
          if [ "$FOUND_ANY" = true ]; then
            echo "Attachments directory contents:"
            ls -lh allure-results/attachments/ 2>/dev/null || echo "Empty"
            TOTAL_SIZE=$(du -sh allure-results/attachments/ 2>/dev/null | cut -f1 || echo '0')
            echo "Total attachment size: $TOTAL_SIZE"
          else
            echo "⚠️  No artifacts were captured for this test run"
            echo "This is expected when tests pass and capture settings are 'failing'"
          fi

      - name: Generate Allure executor information
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "iOS Detox Tests #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ios/",
            "reportName": "Allure Report"
          }
          EOF
          
          echo "Executor information created:"
          cat allure-results/executor.json

      - name: Generate Allure environment properties
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          # Test Environment Configuration
          Platform=iOS
          Device=${{ github.event.inputs.device || 'iPhone 16 Pro' }}
          iOS.Version=${{ github.event.inputs.os_version || '18.2' }}
          Test.Suite=${{ github.event.inputs.test_suite || 'all' }}
          Node.Version=$(node --version)
          Detox.Version=$(yarn list --pattern detox --depth=0 | grep detox@ | sed 's/.*detox@//')
          React.Native.Version=$(node -p "require('./package.json').dependencies['react-native']")
          
          # Test Configuration
          Log.Level=${{ github.event.inputs.logger_level || env.DEFAULT_LOG_LEVEL }}
          Capture.Logs=${{ github.event.inputs.capture_logs || env.DEFAULT_CAPTURE_LOGS }}
          Capture.Screenshots=${{ github.event.inputs.capture_screenshots || env.DEFAULT_CAPTURE_SCREENSHOTS }}
          Capture.Video=${{ github.event.inputs.capture_video || env.DEFAULT_CAPTURE_VIDEO }}
          Record.Performance=${{ github.event.inputs.record_performance || env.DEFAULT_RECORD_PERFORMANCE }}
          
          # CI/CD Information
          Branch=${{ github.ref_name }}
          Commit.SHA=${{ github.sha }}
          Commit.Author=${{ github.actor }}
          Commit.Message=$(git log -1 --pretty=%B | head -n 1)
          Repository=${{ github.repository }}
          Workflow.Run.ID=${{ github.run_id }}
          Workflow.Run.Number=${{ github.run_number }}
          Workflow.Attempt=${{ github.run_attempt }}
          Trigger=${{ github.event_name }}
          Run.Date=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF
          
          echo "Environment properties created:"
          cat allure-results/environment.properties

      - name: Generate Allure categories
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/categories.json << 'EOF'
          [
            {
              "name": "Login Failures",
              "matchedStatuses": ["failed"],
              "messageRegex": ".*login.*"
            },
            {
              "name": "Timeout Issues",
              "matchedStatuses": ["failed", "broken"],
              "messageRegex": ".*timeout.*"
            },
            {
              "name": "Element Not Found",
              "matchedStatuses": ["failed"],
              "messageRegex": ".*not found.*|.*unable to find.*"
            },
            {
              "name": "Infrastructure Issues",
              "matchedStatuses": ["broken"],
              "messageRegex": ".*simulator.*|.*build.*|.*metro.*"
            }
          ]
          EOF

      - name: Generate Allure report from Detox results
        run: |
          echo "Generating Allure report with history..."
          
          # Generate report - Allure will automatically use history from allure-results/history
          allure generate allure-results --clean -o allure-report
          
          echo "Allure report generated successfully with test results and history"
          
          # Verify history was included
          if [ -d "allure-report/history" ]; then
            echo "History successfully included in new report"
            ls -la allure-report/history/
          else
            echo "No history in generated report (this is normal for first run)"
          fi

      - name: Upload Allure report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: ios
          keep_files: true

      - name: Report publishing status
        if: always()
        run: |
          echo "=== Report Publishing Summary ==="
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ios/"
            echo "✅ Report published to GitHub Pages"
            echo "🔗 URL: $REPORT_URL"
          else
            echo "ℹ️  Report not published (not main branch)"
            echo "   Download artifact to view report locally"
          fi

  # =============================================================================
  # Stage 4: Cleanup and Summary
  # =============================================================================
  
  cleanup:
    runs-on: macos-14
    needs: [build, test, publish-allure-report]
    if: always()
    
    steps:
      - name: Clean workspace
        run: |
          echo "Cleaning up Detox Demo Project workspace..."
          # Clean up any temporary files
          rm -rf /tmp/detox* || true
          echo "Cleanup completed"
